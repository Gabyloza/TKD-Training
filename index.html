<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tornado IA Metod v11</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>🌪️ TORNADO IA METOD v11</h1>
<p>Entrenamiento humano + inteligencia adaptativa</p>
</header>

<!-- IA PANEL -->
<section class="card">

<h2>🧠 Tu estado hoy</h2>
<p id="humanAI"></p>

</section>

<!-- SENSACIONES -->
<section class="card">

<h2>📊 Cómo te sentiste hoy</h2>

<label>Energía (0-10)</label>
<input id="energy" type="range" min="0" max="10">

<label>Motivación (0-10)</label>
<input id="motivation" type="range" min="0" max="10">

<label>Fatiga (0-10)</label>
<input id="fatigue" type="range" min="0" max="10">

</section>

<!-- ENTRENAMIENTO -->
<section class="card">

<h2>🥋 Entreno real</h2>

<label>Formas ITF</label>
<input id="forms" type="number">

<label>Sparring</label>
<input id="sparring" type="number">

<label>Fuerza</label>
<input id="strength" type="number">

<label>Velocidad</label>
<input id="speed" type="number">

<label>Flexibilidad</label>
<input id="flex" type="number">

<label>Resistencia</label>
<input id="endurance" type="number">

<textarea id="notes" placeholder="Cómo fue tu entrenamiento real..."></textarea>

<button onclick="save()">Guardar día</button>

</section>

<!-- HISTORIAL -->
<section class="card">

<h2>📚 Evolución real</h2>
<div id="history"></div>

</section>

<!-- GRAFICO -->
<section class="card">

<h2>📈 Tendencia humana</h2>
<canvas id="chart"></canvas>

</section>

<script src="app.js"></script>

</body>
</html>
