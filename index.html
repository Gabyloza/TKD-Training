<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TKD Performance PRO</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>🥋 TKD PERFORMANCE PRO</h1>
<p>Julio → Diciembre | Cinturón Negro</p>
</header>

<!-- DASHBOARD -->
<section class="grid">

<div class="card">
<h2>📊 Progreso</h2>
<div class="bar">
<div id="progress"></div>
</div>
<p id="progressText">0%</p>
</div>

<div class="card">
<h2>🏆 Puntos</h2>
<h1 id="points">0</h1>
</div>

</section>

<!-- ENTRENAMIENTO DIARIO -->
<section class="card">

<h2>🧠 Entrenamiento del día</h2>

<div id="training">

<label>TKD</label>
<input type="range" min="0" max="120" value="0" class="slider" id="tkd">

<label>Fuerza</label>
<input type="range" min="0" max="120" value="0" class="slider" id="strength">

<label>Velocidad</label>
<input type="range" min="0" max="60" value="0" class="slider" id="speed">

<label>Flexibilidad</label>
<input type="range" min="0" max="60" value="0" class="slider" id="flex">

<label>Natación</label>
<input type="range" min="0" max="90" value="0" class="slider" id="swim">

<label>Bicicleta</label>
<input type="range" min="0" max="120" value="0" class="slider" id="bike">

</div>

<br>

<label>Intensidad</label>
<input type="range" min="1" max="10" value="5" id="intensity">

<p>Fatiga</p>
<input type="range" min="1" max="10" value="5" id="fatigue">

<button onclick="saveDay()">💾 Guardar día</button>

</section>

<!-- CHECKLIST -->
<section class="card">

<h2>📅 Actividades</h2>

<div class="checklist">

<label><input type="checkbox" class="act" value="tkd"> TKD</label>
<label><input type="checkbox" class="act" value="combat"> Combate</label>
<label><input type="checkbox" class="act" value="poomsae"> Poomsae</label>
<label><input type="checkbox" class="act" value="strength"> Fuerza</label>
<label><input type="checkbox" class="act" value="speed"> Velocidad</label>
<label><input type="checkbox" class="act" value="flex"> Flexibilidad</label>
<label><input type="checkbox" class="act" value="recovery"> Recuperación</label>

</div>

</section>

<!-- GRAFICO -->
<section class="card">

<h2>📈 Rendimiento</h2>

<canvas id="chart"></canvas>

</section>

<!-- LOGROS -->
<section class="card">

<h2>🏅 Logros</h2>

<ul id="achievements"></ul>

</section>

<script src="app.js"></script>

</body>
</html>
