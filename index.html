<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ITF Elite Athlete System</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>🥋 ITF ELITE SYSTEM</h1>
<p>Atleta digital + IA + planificación profesional</p>
</header>

<!-- ATHLETE STATUS -->
<section class="grid">

<div class="card">
<h2>🎮 Nivel Atleta</h2>
<h1 id="level">1</h1>
<p>XP: <span id="xp">0</span></p>
</div>

<div class="card">
<h2>🧠 Score IA</h2>
<h1 id="score">0</h1>
<p id="aiMessage">Analizando...</p>
</div>

</section>

<!-- CALENDARIO -->
<section class="card">

<h2>📅 Macrociclo ITF</h2>
<p id="cycle">Cargando...</p>

<div class="bar">
<div id="cycleBar"></div>
</div>

</section>

<!-- ENTRENAMIENTO -->
<section class="card">

<h2>🧠 Entrenamiento diario</h2>

<label>Formas ITF</label>
<input type="range" min="0" max="120" id="forms">

<label>Sparring</label>
<input type="range" min="0" max="120" id="sparring">

<label>Fuerza</label>
<input type="range" min="0" max="120" id="strength">

<label>Velocidad</label>
<input type="range" min="0" max="80" id="speed">

<label>Flexibilidad</label>
<input type="range" min="0" max="80" id="flex">

<label>Resistencia</label>
<input type="range" min="0" max="120" id="endurance">

<label>Fatiga (1-10)</label>
<input type="range" min="1" max="10" id="fatigue">

<label>Intensidad (1-10)</label>
<input type="range" min="1" max="10" id="intensity">

<button onclick="saveTraining()">💾 Guardar sesión</button>

</section>

<!-- STATUS PANEL -->
<section class="card">

<h2>📊 Estado del atleta</h2>

<p><b>Interpretación IA:</b></p>
<p id="aiFull"></p>

</section>

<!-- GRAFICO -->
<section class="card">

<h2>📈 Rendimiento ITF</h2>
<canvas id="chart"></canvas>

</section>

<!-- LOGROS -->
<section class="card">

<h2>🏆 Logros</h2>
<ul id="achievements"></ul>

</section>

<script src="app.js"></script>

</body>
</html>
