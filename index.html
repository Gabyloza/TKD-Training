<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ITF Athlete OS 8.0</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>🥋 ITF ATHLETE OS 8.0</h1>

<nav>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('calendar')">Calendario</button>
<button onclick="show('session')">Entreno</button>
<button onclick="show('history')">Historial</button>
</nav>

</header>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">

<h2>🧠 IA Coach</h2>
<p id="ai"></p>

<h2>📊 Estado del atleta</h2>
<p id="status"></p>

<canvas id="chart"></canvas>

</section>

<!-- CALENDARIO -->
<section id="calendar" class="page">

<h2>📅 Calendario</h2>
<div id="cal"></div>

</section>

<!-- SESIÓN -->
<section id="session" class="page">

<h2>🥋 Sesión de entrenamiento</h2>

<label>Formas ITF</label>
<input id="forms" type="number">

<label>Sparring</label>
<input id="sparring" type="number">

<label>Fuerza</label>
<input id="strength" type="number">

<label>Velocidad</label>
<input id="speed" type="number">

<label>Flexibilidad</label>
<input id="flex" type="number">

<label>Resistencia</label>
<input id="endurance" type="number">

<h3>📝 Observaciones</h3>
<textarea id="notes" placeholder="Cómo te sentiste, errores, feedback..."></textarea>

<button onclick="save()">💾 Guardar sesión</button>

</section>

<!-- HISTORIAL -->
<section id="history" class="page">

<h2>📚 Historial completo</h2>
<div id="list"></div>

</section>

<script src="app.js"></script>

</body>
</html>
