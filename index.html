<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TKD Elite Performance System</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>🥋 TKD ELITE SYSTEM</h1>
<p>Julio → Diciembre | Alto Rendimiento</p>
</header>

<!-- NIVEL + XP -->
<section class="grid">

<div class="card">
<h2>🎮 Nivel Atleta</h2>
<h1 id="level">1</h1>
<p>XP: <span id="xp">0</span></p>
</div>

<div class="card">
<h2>📊 Carga semanal</h2>
<h1 id="load">0</h1>
<p id="loadStatus">Sin datos</p>
</div>

</section>

<!-- MACROCICLO -->
<section class="card">

<h2>📅 Macrociclo</h2>

<p id="cycle">Julio - Base</p>

<div class="bar">
<div id="cycleBar"></div>
</div>

</section>

<!-- ENTRENAMIENTO -->
<section class="card">

<h2>🧠 Entrenamiento diario</h2>

<label>TKD</label>
<input type="range" min="0" max="120" id="tkd">

<label>Fuerza</label>
<input type="range" min="0" max="120" id="strength">

<label>Velocidad</label>
<input type="range" min="0" max="80" id="speed">

<label>Flexibilidad</label>
<input type="range" min="0" max="80" id="flex">

<label>Natación</label>
<input type="range" min="0" max="100" id="swim">

<label>Bicicleta</label>
<input type="range" min="0" max="120" id="bike">

<br>

<label>Fatiga (1-10)</label>
<input type="range" min="1" max="10" id="fatigue">

<label>Intensidad (1-10)</label>
<input type="range" min="1" max="10" id="intensity">

<button onclick="saveTraining()">💾 Guardar entrenamiento</button>

</section>

<!-- CHECKLIST -->
<section class="card">

<h2>📅 Actividades realizadas</h2>

<div class="check">

<label><input type="checkbox" value="tkd"> TKD</label>
<label><input type="checkbox" value="combat"> Combate</label>
<label><input type="checkbox" value="poomsae"> Poomsae</label>
<label><input type="checkbox" value="strength"> Fuerza</label>
<label><input type="checkbox" value="speed"> Velocidad</label>
<label><input type="checkbox" value="flex"> Flexibilidad</label>
<label><input type="checkbox" value="recovery"> Recuperación</label>

</div>

</section>

<!-- GRAFICO -->
<section class="card">

<h2>📈 Rendimiento</h2>
<canvas id="chart"></canvas>

</section>

<!-- LOGROS -->
<section class="card">

<h2>🏆 Logros</h2>
<ul id="achievements"></ul>

</section>

<script src="app.js"></script>

</body>
</html>
